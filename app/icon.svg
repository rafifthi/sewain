<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000">
  <rect width="1000" height="1000" rx="220" fill="#1a5cff"/>
  <!-- Speaker cone (left triangle) -->
  <polygon points="200,370 200,630 390,750 390,250" fill="white"/>
  <!-- Speaker box body -->
  <rect x="320" y="380" width="80" height="240" rx="8" fill="white"/>
  <!-- First sound wave arc -->
  <path d="M520,340 C580,390 580,610 520,660" stroke="white" stroke-width="72" fill="none" stroke-linecap="round"/>
  <!-- Second sound wave arc -->
  <path d="M640,280 C740,360 740,640 640,720" stroke="white" stroke-width="65" fill="none" stroke-linecap="round"/>
  <!-- Third sound wave arc (partial, cut off like logo) -->
  <path d="M755,230 C855,330 855,550 800,680" stroke="white" stroke-width="60" fill="none" stroke-linecap="round" stroke-dasharray="460 200"/>
</svg>
